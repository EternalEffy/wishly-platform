server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: wishly-gateway
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

      routes:
        # Auth Service
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://wishly-auth-service:8083}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # Notes Service (formerly Paste) - supports both paths
        - id: notes-service
          uri: ${NOTES_SERVICE_URL:http://wishly-notes-service:8082}
          predicates:
            - Path=/api/notes/**
          filters:
            - StripPrefix=0
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET,POST
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false

        # Hash Generator Service
        - id: hash-generator-service
          uri: ${HASH_SERVICE_URL:http://wishly-hash-generator-service:8081}
          predicates:
            - Path=/api/hash/**
          filters:
            - StripPrefix=0

        # Wishlist Service (NEW)
        - id: wishlist-service
          uri: http://wishly-wishlist-service:8084
          predicates:
            - Path=/api/wishlists/**
          filters:
            - StripPrefix=0

        # Health Check
        - id: health-route
          uri: ${NOTES_SERVICE_URL:http://wishly-notes-service:8082}
          predicates:
            - Path=/health/**
          filters:
            - StripPrefix=0

# Rate Limiting Configuration
rate-limit:
  enabled: true
  max-tokens: 100
  refill-rate: 10
  key-prefix: "rate-limit:"

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.wishly.gateway: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}