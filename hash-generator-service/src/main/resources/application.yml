server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: hash-generator-service

  # Redis Configuration
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: ${REDIS_TIMEOUT:60000}
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX:10}
        max-idle: ${REDIS_POOL_IDLE:5}
        min-idle: ${REDIS_POOL_MIN:2}

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

# Hash Generation Settings
hash:
  generator:
    pool-key: ${POOL_KEY:hash:pool}
    length: ${HASH_LENGTH:8}
    pool:
      threshold: ${POOL_THRESHOLD:100}
      batch-size: ${POOL_BATCH_SIZE:1000}
# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.pastebin.hashgenerator: ${LOG_LEVEL_APP:DEBUG}