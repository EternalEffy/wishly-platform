services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pastebin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pastebin
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pastebin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pastebin-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pastebin-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pastebin-network

  # Paste Service
  paste-service:
    build:
      context: .
      dockerfile: pastebin-service/Dockerfile
    container_name: pastebin-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=pastebin
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - DB_DDL_AUTO=update
      - DB_SHOW_SQL=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HASH_SERVICE_URL=http://hash-generator-service:8081
      - LOG_LEVEL_ROOT=INFO
      - LOG_LEVEL_APP=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pastebin-network

  # Hash Generator Service
  hash-generator-service:
    build:
      context: .
      dockerfile: hash-generator-service/Dockerfile
    container_name: hash-generator-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL_ROOT=INFO
      - LOG_LEVEL_APP=DEBUG
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pastebin-network

  # API Gateway
  pastebin-gateway:
    build:
      context: .
      dockerfile: pastebin-gateway/Dockerfile
    container_name: pastebin-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - PASTE_SERVICE_URL=http://paste-service:8082
      - HASH_SERVICE_URL=http://hash-generator-service:8081
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL_ROOT=INFO
      - LOG_LEVEL_APP=DEBUG
    depends_on:
      - paste-service
      - hash-generator-service
    networks:
      - pastebin-network

# Volumes (Persistent Data)
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Networks (Isolated Network)
networks:
  pastebin-network:
    driver: bridge