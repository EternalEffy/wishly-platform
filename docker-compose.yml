name: wishly-platform

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wishly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wishly
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - wishly_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d wishly" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wishly-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wishly-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - wishly_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wishly-network

  # MinIO Blob Storage
  minio:
    image: minio/minio
    container_name: wishly-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - wishly_minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wishly-network

  # Auth Service
  wishly-auth-service:
    build:
      context: .
      dockerfile: wishly-auth-service/Dockerfile
    container_name: wishly-auth-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=${SERVER_PORT_AUTH:-8083}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME_AUTH:-authdb}
      - DB_USERNAME=${DB_USERNAME:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DDL_AUTO=${DB_DDL_AUTO:-update}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-min-32-characters}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-900000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800000}
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-INFO}
      - LOG_LEVEL_APP=${LOG_LEVEL_APP:-DEBUG}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wishly-network

  # Notes Service (formerly Paste)
  wishly-notes-service:
    build:
      context: .
      dockerfile: wishly-notes-service/Dockerfile
    container_name: wishly-notes-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=${SERVER_PORT_NOTES:-8082}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME_NOTES:-notesdb}
      - DB_USERNAME=${DB_USERNAME:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DDL_AUTO=${DB_DDL_AUTO:-update}
      - DB_SHOW_SQL=${DB_SHOW_SQL:-false}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - MINIO_URL=${MINIO_URL:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-notes}
      - HASH_SERVICE_URL=${HASH_SERVICE_URL:-http://wishly-hash-generator-service:8081}
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-INFO}
      - LOG_LEVEL_APP=${LOG_LEVEL_APP:-DEBUG}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wishly-network

  # Hash Generator Service
  wishly-hash-generator-service:
    build:
      context: .
      dockerfile: wishly-hash-generator-service/Dockerfile
    container_name: wishly-hash-generator-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=${SERVER_PORT_HASH:-8081}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-INFO}
      - LOG_LEVEL_APP=${LOG_LEVEL_APP:-DEBUG}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wishly-network

  # API Gateway
  wishly-gateway:
    build:
      context: .
      dockerfile: wishly-gateway/Dockerfile
    container_name: wishly-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=${SERVER_PORT_GATEWAY:-8080}
      - NOTES_SERVICE_URL=${NOTES_SERVICE_URL:-http://wishly-notes-service:8082}
      - HASH_SERVICE_URL=${HASH_SERVICE_URL:-http://wishly-hash-generator-service:8081}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://wishly-auth-service:8083}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-INFO}
      - LOG_LEVEL_APP=${LOG_LEVEL_APP:-DEBUG}
    depends_on:
      wishly-notes-service:
        condition: service_started
      wishly-hash-generator-service:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - wishly-network

  # Wishlist Service
  wishly-wishlist-service:
    build:
      context: .
      dockerfile: wishly-wishlist-service/Dockerfile
    container_name: wishly-wishlist-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=${SERVER_PORT_WISHLIST:-8084}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME_WISHLIST:-wishly}
      - DB_USERNAME=${DB_USERNAME:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DDL_AUTO=${DB_DDL_AUTO:-update}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://wishly-auth-service:8083}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-min-32-characters}
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-INFO}
      - LOG_LEVEL_APP=${LOG_LEVEL_APP:-DEBUG}
    depends_on:
      postgres:
        condition: service_healthy
      wishly-auth-service:
        condition: service_started
    networks:
      - wishly-network

# Volumes (Persistent Data)
volumes:
  wishly_postgres_data:
    driver: local
  wishly_redis_data:
    driver: local
  wishly_minio_data:
    driver: local

# Networks (Isolated Network)
networks:
  wishly-network:
    driver: bridge